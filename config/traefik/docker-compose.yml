services:
  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/appserver/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - appserver

networks:
  appserver:
    external: true
    name: appserver
