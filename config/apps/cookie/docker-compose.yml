# Cookie — production deployment for appserver
# Env vars loaded from .env file in same directory
# Generate .env with: appserver app init cookie

services:
  db:
    image: postgres:18-alpine
    container_name: cookie-db
    restart: unless-stopped
    volumes:
      - cookie-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cookie
      POSTGRES_USER: cookie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run 'appserver app init cookie' to generate .env}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookie -d cookie"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 256M

  web:
    image: ghcr.io/matthewdeaves/cookie:${COOKIE_VERSION:-1.27.0}
    container_name: cookie-web
    restart: unless-stopped
    volumes:
      - cookie-media:/app/data/media
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:?Run 'appserver app init cookie' to generate .env}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-cookie.matthewdeaves.com,localhost}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://cookie.matthewdeaves.com}
      - DATABASE_URL=postgres://cookie:${POSTGRES_PASSWORD}@db:5432/cookie
      - AUTH_MODE=${AUTH_MODE:-passkey}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-matthewdeaves.com}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-Cookie}
      - SITE_URL=${SITE_URL:-https://cookie.matthewdeaves.com}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - COOKIE_VERSION=${COOKIE_VERSION:-1.27.0}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/system/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cookie.rule=Host(`cookie.matthewdeaves.com`)"
      - "traefik.http.routers.cookie.entrypoints=web"
      - "traefik.http.services.cookie.loadbalancer.server.port=80"
    networks:
      - default
      - appserver

volumes:
  cookie-postgres-data:
    name: cookie-postgres-data
  cookie-media:
    name: cookie-media

networks:
  appserver:
    external: true
    name: appserver
