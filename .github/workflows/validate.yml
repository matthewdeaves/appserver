name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks can diff-scan PR commits against the
          # base branch. The default shallow clone (depth=1) makes
          # `gitleaks detect <sha>^..<sha>` fail with "unknown revision".
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.14.7

      - name: Terraform Format
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Cookie version pin check
        run: |
          compose=config/apps/cookie/docker-compose.yml
          img=$(grep -oP 'cookie:\$\{COOKIE_VERSION:-\K[^}]+' "$compose")
          if [ -z "$img" ]; then
            echo "Could not parse COOKIE_VERSION default in image tag in $compose" >&2
            exit 1
          fi
          if grep -qE 'COOKIE_VERSION=\$\{COOKIE_VERSION:-' "$compose"; then
            echo "COOKIE_VERSION=\${COOKIE_VERSION:-...} env-var default found in $compose" >&2
            echo "It must NOT be set here — version is baked into the image at build time." >&2
            echo "See compose file comment for rationale." >&2
            exit 1
          fi
          echo "COOKIE_VERSION pinned to: $img"

      - name: ShellCheck scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        env:
          # -x lets shellcheck follow `source "$SCRIPT_DIR/lib/*.sh"` directives,
          # silencing SC1091 ("not following") on the lib split.
          SHELLCHECK_OPTS: '-x'
        with:
          scandir: scripts/
          severity: warning

      - name: Validate Claude hooks
        run: |
          set -euo pipefail
          for f in .claude/hooks/*.sh; do
            bash -n "$f"
          done
          shellcheck .claude/hooks/*.sh
          bash .claude/hooks/test-hooks.sh

      - name: Auth-flow tests
        run: |
          set -euo pipefail
          bash -n tests/auth-flow-test.sh
          shellcheck tests/auth-flow-test.sh
          bash tests/auth-flow-test.sh

      - name: ShellCheck pentest
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        env:
          SHELLCHECK_OPTS: '-x'
        with:
          scandir: pentest/
          severity: warning

      - name: Terraform Security (tfsec)
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

      - name: Dependency Review
        if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

      - name: Gitleaks
        if: github.actor != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Honours .gitleaks.toml at repo root (allowlists RFC 6455
          # example nonce in the pentest WebSocket-probe module).
          GITLEAKS_CONFIG: .gitleaks.toml
